<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="catalog">

    <div class="container catalog__container">
      <img src="images/dandelions.png" alt="Фон с одуванчиками" class="catalog__background" />
      <h1 class="catalog__title" id="catalog-title"> Выбери свой продукт</h1>

      <div class="button">
        <button id="change-color-all-card-button"> Сменит цвет всех карточки </button>
        <button id="change-color-first-card-button"> Сменит цвет первой карточки </button>
        <button id="open-google-button"> Открыт страницу Google.com </button>
        <button id="output-console-log"> Вывести сообщение в консоль </button>
        <button class="toggle-color-button" id="toggle-color-button"> Переключатель цвета кнопки</button>
      </div>

      <ul class="products">
        <template id="product-template">
          <li class="products__item card">
            <img src="" alt="" class="card__images" width="290" />
            <span class="card__category"></span>
            <h2 class="card__name"></h2>
            <p class="card__description"></p>

            <div class="card__compound compound">
              <span class="compound__name">Состав:</span>
              <ul class="compound__list"></ul>
            </div>

            <div class="card__price">
              <b class="card__price-label">Цена</b>
              <span class="card__price-value"></span>
            </div>
          </li>
        </template>
      </ul>

    </div>

  </main>
  <script src="main.js"></script>
  <script src="homework-7.js"></script>
  <script src="homework-8.js"></script>
  <script src="homework-9.js" type="module"></script>
  <script src="homework-10.js" type="module"></script>
</body>

</html>
